services:
  # Production Sevice
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - gateway
    restart: always
    networks:
      - crypto-network
  
  # ── Application Services ─────────────────────────────────────
  gateway:
    build:
      context: ./services/gateway
      target: production
    ports:
      - "8080:8080"
    env_file: ./services/gateway/.env
    environment:
      NODE_ENV: production
    restart: always
    networks:
      - crypto-network

  auth-service:
    build:
      context: ./services/auth-service
      target: production
    expose:
      - "3001"
    env_file: ./services/auth-service/.env
    environment:
      NODE_ENV: production
    restart: always
    networks:
      - crypto-network

  blockchain-service:
    build:
      context: ./services/blockchain-service
      target: production
    expose:
      - "3002"
    env_file: ./services/blockchain-service/.env
    environment:
      NODE_ENV: production
    restart: always
    networks:
      - crypto-network

  wallet-service:
    build:
      context: ./services/wallet-service
      target: production
    expose:
      - "3003"
    env_file: ./services/wallet-service/.env
    environment:
      NODE_ENV: production
    restart: always
    networks:
      - crypto-network

  notification-service:
    build:
      context: ./services/notification-service
      target: production
    expose:
      - "3004"
    env_file: ./services/notification-service/.env
    environment:
      NODE_ENV: production
    restart: always
    networks:
      - crypto-network

  price-service:
    build:
      context: ./services/price-service
      target: production
    expose:
      - "3005"
    env_file: ./services/price-service/.env
    environment:
      NODE_ENV: production
    restart: always
    networks:
      - crypto-network
volumes:

networks:
  crypto-network:
    name: crypto-network
    driver: bridge